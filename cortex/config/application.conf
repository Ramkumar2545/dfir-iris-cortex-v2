# =============================================================
# Cortex 4.0.0 — application.conf
# Mounted: ./cortex/config:/etc/cortex
# Docs: https://github.com/TheHive-Project/Cortex/wiki
#
# Secret key is injected from .env via docker-compose:
#   CORTEX_SECRET_KEY is set in .env → passed via env_file → container env
#   HOCON substitution ${?CORTEX_SECRET_KEY} picks it up at runtime.
#   Auto-generated by setup.sh (openssl rand -base64 48).
# =============================================================

# ── Play secret key (from CORTEX_SECRET_KEY env var) ─────────────
play.http.secret.key = ${?CORTEX_SECRET_KEY}

# ── Elasticsearch (ES 8.x — required for Cortex 4.0.0) ──────────
search {
  index = cortex
  uri   = "http://cortex_es:9200"

  search-bulk-size          = 100
  scroll-keepalive          = "1m"
  topology-check-max-delay  = "1h"
}

# ── HTTP server ──────────────────────────────────────
http.port = 9001
play.server.http.port    = 9001
play.server.http.address = "0.0.0.0"

# ── Job runner ──────────────────────────────────────────
job {
  runner = [docker]

  directory       = /opt/cortex-jobs

  # Dynamically reads the absolute host path from Docker environment variable.
  # Set via CORTEX_DOCKER_JOB_DIR in docker-compose.yml, which expands
  # ${PROJECT_ROOT}/cortex/jobs written to .env by setup.sh.
  dockerDirectory = ${?CORTEX_DOCKER_JOB_DIR}

  docker {
    autoUpdate = false
    timeout    = "30 minutes"
  }
}

# ── Analyzer catalog ─────────────────────────────────────────
# Without these URLs, /api/analyzer returns [] and the
# Organization → Analyzers tab in the UI is empty.
# Cortex downloads the catalog at startup and each analyzer
# runs as its own Docker container pulled from Docker Hub.
analyzer {
  urls = [
    "https://download.thehive-project.org/analyzers.json"
  ]
  fork-join-executor {
    parallelism-min    = 2
    parallelism-factor = 2.0
    parallelism-max    = 4
  }
}

# ── Responder catalog ───────────────────────────────────────
responder {
  urls = [
    "https://download.thehive-project.org/responders.json"
  ]
  fork-join-executor {
    parallelism-min    = 2
    parallelism-factor = 2.0
    parallelism-max    = 4
  }
}

# ── Cache ─────────────────────────────────────────────────
cache.job = 10 minutes

# ── Disable CSRF for API clients (IRIS worker) ──────────────
play.filters.disabled += "play.filters.csrf.CSRFFilter"

# ── Logging — points to our logback.xml ────────────────────
# (set via JVM arg -Dlogger.file=/etc/cortex/logback.xml)
