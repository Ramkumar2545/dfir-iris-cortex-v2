# =============================================================
# Cortex 4.0.0 — application.conf
# Mounted: ./cortex/config:/etc/cortex
# Docs: https://github.com/TheHive-Project/Cortex/wiki
#
# Secret key is injected from .env via docker-compose:
#   CORTEX_SECRET_KEY is set in .env → passed via env_file → container env
#   HOCON substitution ${?CORTEX_SECRET_KEY} picks it up at runtime.
#   Auto-generated by setup.sh (openssl rand -base64 48).
# =============================================================

# ── Play secret key (from CORTEX_SECRET_KEY env var) ─────────
play.http.secret.key = ${?CORTEX_SECRET_KEY}

# ── Elasticsearch (ES 8.x — required for Cortex 4.0.0) ───────
search {
  index = cortex
  uri   = "http://cortex_es:9200"

  search-bulk-size          = 100
  scroll-keepalive          = "1m"
  topology-check-max-delay  = "1h"
}

# ── HTTP server ───────────────────────────────────────────────
http.port = 9001
play.server.http.port    = 9001
play.server.http.address = "0.0.0.0"

# ── Job runner ────────────────────────────────────────────────
job {
  runner = [docker]

  directory       = /tmp/cortex-jobs
  dockerDirectory = /tmp/cortex-jobs

  docker {
    autoUpdate = false
    timeout    = "30 minutes"
  }
}

# ── Cache ─────────────────────────────────────────────────────
cache.job = 10 minutes

# ── Disable CSRF for API clients (IRIS worker) ────────────────
play.filters.disabled += "play.filters.csrf.CSRFFilter"

# ── Logging — points to our logback.xml ──────────────────────
# (set via JVM arg -Dlogger.file=/etc/cortex/logback.xml)
