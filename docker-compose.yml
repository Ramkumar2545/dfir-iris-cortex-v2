# ============================================================
# DFIR-IRIS + Cortex — Universal Stack v2
#
# All versions driven by .env:
#   IRIS_VERSION    (default: v2.4.27)
#   CORTEX_VERSION  (default: latest = 4.0.0)
#   ES_VERSION      (default: 8.13.0)
#   PROJECT_ROOT    (written by setup.sh — absolute host path)
#
# Quick Start:
#   1. cp .env.example .env  →  edit CHANGE_ME values
#   2. sudo bash scripts/setup.sh
#   3. docker compose up -d
#   4. bash scripts/install_module.sh
#
# Upgrade any component:
#   Edit IRIS_VERSION / CORTEX_VERSION / ES_VERSION in .env
#   bash scripts/update.sh
# ============================================================

services:

  # ── IRIS Stack ──────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: iriswebapp_rabbitmq
    restart: unless-stopped
    networks: [iris_backend]
    deploy:
      resources:
        limits:
          memory: 512m

  db:
    image: ghcr.io/dfir-iris/iriswebapp_db:${IRIS_VERSION:-v2.4.27}
    container_name: iriswebapp_db
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
    networks: [iris_backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iris}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  app:
    image: ghcr.io/dfir-iris/iriswebapp_app:${IRIS_VERSION:-v2.4.27}
    container_name: iriswebapp_app
    command: ["nohup", "./iris-entrypoint.sh", "iriswebapp"]
    restart: unless-stopped
    env_file: [.env]
    # extra_hosts: allows reaching Docker host via host.docker.internal.
    # If 'cortex' DNS fails, use http://host.docker.internal:9001 as cortex_url.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./certificates/rootCA/irisRootCACert.pem:/etc/irisRootCACert.pem:ro
      - ./certificates/:/home/iris/certificates/:ro
      - ./certificates/ldap/:/iriswebapp/certificates/ldap/:ro
      - iris-downloads:/home/iris/downloads
      - user_templates:/home/iris/user_templates
      - server_data:/home/iris/server_data
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks: [iris_backend, iris_frontend]
    deploy:
      resources:
        limits:
          memory: 2g

  worker:
    image: ghcr.io/dfir-iris/iriswebapp_app:${IRIS_VERSION:-v2.4.27}
    container_name: iriswebapp_worker
    restart: unless-stopped
    command:
      - "./wait-for-iriswebapp.sh"
      - "app:8000"
      - "./iris-entrypoint.sh"
      - "iris-worker"
    env_file: [.env]
    environment:
      - IRIS_WORKER=1
    # extra_hosts: allows reaching Docker host via host.docker.internal.
    # If 'cortex' DNS fails, use http://host.docker.internal:9001 as cortex_url.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./certificates/rootCA/irisRootCACert.pem:/etc/irisRootCACert.pem:ro
      - ./certificates/:/home/iris/certificates/:ro
      - ./certificates/ldap/:/iriswebapp/certificates/ldap/:ro
      - iris-downloads:/home/iris/downloads
      - user_templates:/home/iris/user_templates
      - server_data:/home/iris/server_data
    depends_on: [rabbitmq, db, app]
    networks: [iris_backend]
    deploy:
      resources:
        limits:
          memory: 1g

  iriswebapp_nginx:
    image: ghcr.io/dfir-iris/iriswebapp_nginx:${IRIS_VERSION:-v2.4.27}
    container_name: iriswebapp_nginx
    restart: unless-stopped
    environment:
      - IRIS_UPSTREAM_SERVER=app
      - IRIS_UPSTREAM_PORT=8000
      - SERVER_NAME=_
      - INTERFACE_HTTPS_PORT=443
      - CERT_FILENAME=iris.crt
      - KEY_FILENAME=iris.key
    ports:
      - "443:443"
    volumes:
      - ./certificates/web_certificates/:/www/certs/:ro
    depends_on: [app]
    networks: [iris_frontend]
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Cortex Stack ────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-8.13.0}
    container_name: cortex_es
    restart: unless-stopped
    environment:
      - http.host=0.0.0.0
      - discovery.type=single-node
      - cluster.name=cortex
      - thread_pool.search.queue_size=100000
      - thread_pool.write.queue_size=100000
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx2g
    volumes:
      - cortex_es_data:/usr/share/elasticsearch/data
      - cortex_es_logs:/usr/share/elasticsearch/logs
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    networks: [cortex_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://localhost:9200/_cat/health || exit 1"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 3g
    memswap_limit: 3g

  cortex:
    image: thehiveproject/cortex:${CORTEX_VERSION:-latest}
    container_name: cortex
    restart: unless-stopped
    user: "0:0"
    env_file: [.env]
    environment:
      JAVA_OPTS: "-Xms1g -Xmx1g -XX:MaxMetaspaceSize=400m -XX:ReservedCodeCacheSize=256m"
      es_uri: http://cortex_es:9200
      # Passes the absolute host path into the container so application.conf
      # can read it via HOCON: dockerDirectory = ${?CORTEX_DOCKER_JOB_DIR}
      # ${PROJECT_ROOT} is expanded from .env written by setup.sh.
      CORTEX_DOCKER_JOB_DIR: ${PROJECT_ROOT}/cortex/jobs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./cortex/jobs:/opt/cortex-jobs
      - ./cortex/config:/etc/cortex
      - ./cortex/logs:/var/log/cortex
      - ./cortex/neurons:/opt/cortexneurons
    ports:
      - "9001:9001"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [cortex_net, iris_backend]
    healthcheck:
      # Cortex 4.x — correct endpoint is /api/status (no /cortex prefix)
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9001/api/status | grep -qE '^(200|520)$'"]
      start_period: 90s
      interval: 15s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 2g
    memswap_limit: 2g

volumes:
  db_data:
  iris-downloads:
  user_templates:
  server_data:
  cortex_es_data:
  cortex_es_logs:

networks:
  iris_backend:  { name: iris_backend,  driver: bridge }
  iris_frontend: { name: iris_frontend, driver: bridge }
  cortex_net:    { driver: bridge }
